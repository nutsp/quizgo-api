services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: virtual_exam
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: appsecret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d virtual_exam"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    image: sutad/quizgo-api:latest
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: appuser
      DB_PASSWORD: appsecret
      DB_NAME: virtual_exam
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_CONTENT_DB: "0"
      REDIS_USER_DB: "1"
      REDIS_RESULT_DB: "2"
      REDIS_RUNTIME_DB: "3"
      REDIS_CACHE_ENABLED: "true"
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 24h
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      AUTO_MIGRATE: "true"
      AUTO_SEED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
